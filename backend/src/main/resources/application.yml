spring:
  application:
    name: digital-twin-platform

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/digital_twin_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:boopathi//93607}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate      # schema is owned by Flyway, not Hibernate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
   host: smtp.gmail.com
   port: 587
   username: 3344boopathi@gmail.com
   password: izuufuaxfvlgciir
   properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-in-prod-min-256-bits-long-value}
    access-token-expiration-ms: ${JWT_ACCESS_EXP:3600000}      # 1 hour
    refresh-token-expiration-ms: ${JWT_REFRESH_EXP:604800000}  # 7 days
    issuer: digital-twin-platform

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  file-storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
    max-resume-size-mb: 10

  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    reset-password-path: /reset-password
    verify-email-path: /verify-email

  gemini:
    api-key: ${GEMINI_API_KEY:}
    api-url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}
    timeout-seconds: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.digitaltwin.platform: DEBUG
    org.hibernate.SQL: WARN

