version: "3.9"

# =====================================================================
# AI-Powered Digital Twin & Interview Readiness Platform
# Full local/staging stack: MySQL + Spring Boot backend + React
# frontend (served by its own Nginx, which also reverse-proxies to
# the backend — see docker/nginx.conf).
# =====================================================================

services:
  mysql:
    image: mysql:8.4
    container_name: dtp_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-digital_twin_platform}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-dtp_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dtp_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql:ro
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/2-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dtp_network

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: dtp_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-digital_twin_platform}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME:-dtp_user}
      DB_PASSWORD: ${DB_PASSWORD:-dtp_password}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXP: ${JWT_ACCESS_EXP:-3600000}
      JWT_REFRESH_EXP: ${JWT_REFRESH_EXP:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_URL: ${GEMINI_API_URL:-https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - dtp_network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: dtp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - dtp_network

networks:
  dtp_network:
    driver: bridge

volumes:
  mysql_data:
  backend_uploads:
